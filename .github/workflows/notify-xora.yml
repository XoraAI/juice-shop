name: notify-xora

on:
  push:
    branches:
      - master

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch juice-shop-push to XoraAI/xora
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.XORA_DISPATCH_TOKEN }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: 'XoraAI',
              repo: 'xora',
              event_type: 'juice-shop-push',
              client_payload: {
                ref: context.sha
              }
            });
